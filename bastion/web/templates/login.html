<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bastion · {{ t("sign_in") }}</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: #161b22; border: 1px solid #21262d; border-radius: 12px;
      padding: 32px; width: 320px; text-align: center;
    }
    .card h1 { margin: 0 0 4px; font-size: 22px; }
    .card p { color: #7d8590; font-size: 13px; margin: 0 0 20px; }
    input {
      width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #e6edf3; padding: 10px 12px; font-size: 14px; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #388bfd; }
    button {
      width: 100%; background: #238636; border: none; border-radius: 8px;
      color: #fff; padding: 10px; font-size: 14px; cursor: pointer;
    }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>🛡 Bastion</h1>
    <p>{{ t("login_title") }}</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <input type="password" name="password" placeholder="{{ t('password') }}" autofocus required>
    <button type="submit">{{ t("sign_in") }}</button>
  </form>
</body>
</html>
