services:
  bastion:
    build: .
    # image: ghcr.io/jamkris/bastion:latest   # for deployment
    container_name: bastion
    restart: unless-stopped

    # Pass everything in .env (e.g. BASTION_AUTH_PASSWORD) into the container.
    env_file:
      - .env

    # Host network + NET_ADMIN are required to read the host firewall/ports.
    network_mode: host
    cap_add:
      - NET_ADMIN

    environment:
      BASTION_SUDO: "false"          # container runs as root, no sudo needed
      # BASTION_GEOIP_DB: /geoip/GeoLite2-Country.mmdb
      # BASTION_JAILS: sshd          # empty -> auto-discover

    volumes:
      # fail2ban socket (jail status)
      - /var/run/fail2ban/fail2ban.sock:/var/run/fail2ban/fail2ban.sock
      # auth log (attacker aggregation) — read-only
      - /var/log:/var/log:ro
      # persisted user preferences from the Settings page (survives restarts)
      - bastion_data:/app/data
      # jail.local (read-write) — only for the "Persist to jail.local" allowlist
      # option, so ignoreip entries survive a fail2ban restart.
      # - /etc/fail2ban/jail.local:/etc/fail2ban/jail.local
      # GeoIP DB (optional)
      # - /path/to/geoip:/geoip:ro

    # With host networking the app listens directly on :8009 (no port mapping).
    # Keep it behind Cloudflare Access / wg-easy — never expose to the internet.

volumes:
  bastion_data:
